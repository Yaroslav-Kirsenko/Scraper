spring.application.name=Scraper

spring.datasource.url=jdbc:postgresql://localhost:5432/scraper
spring.datasource.username=your-username
spring.datasource.password=your-password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.open-in-view=false

server.port=8080

scraper.url=https://jobs.techstars.com/jobs
scraper.base-url=https://jobs.techstars.com
scraper.cron=0 0 */6 * * *
scraper.user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36
scraper.timeout-seconds=30
scraper.scroll-delay-ms=1500
scraper.button-delay-ms=500
scraper.retry-delay-ms=3000
scraper.loading-delay-ms=2000
scraper.max-scrape-duration-ms=60000

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.api-docs.path=/api-docs

logging.level.com.example.scraper=INFO
logging.level.org.hibernate.SQL=WARN